<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Studio — Générateur de Prompts IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e13;
  --bg2: #13161d;
  --bg3: #1a1e28;
  --bg4: #222733;
  --border: #2a2f3d;
  --border-hover: #3d4459;
  --text: #e4e7ef;
  --text2: #9ba1b5;
  --text3: #6b7188;
  --accent: #a78bfa;
  --accent2: #c4b5fd;
  --accent-glow: rgba(167, 139, 250, 0.15);
  --green: #34d399;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --pink: #f472b6;
  --red: #f87171;
  --amber: #f59e0b;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(167,139,250,0.05), transparent),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(96,165,250,0.04), transparent);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(12, 14, 19, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
}

.header-inner {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  border-radius: 10px;
  display: grid;
  place-items: center;
  font-size: 16px;
  box-shadow: 0 2px 12px rgba(167,139,250,0.3);
}

.logo-text {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 1.2rem;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-badge {
  font-size: 0.65rem;
  padding: 3px 10px;
  border-radius: 12px;
  background: var(--accent-glow);
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* ── MAIN ── */
main {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem;
}

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 2rem 0 1.5rem;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 900;
  margin-bottom: 0.5rem;
  line-height: 1.2;
}

.hero h1 .ai-gradient {
  background: linear-gradient(135deg, var(--purple), var(--blue), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  color: var(--text2);
  font-size: 1rem;
  max-width: 500px;
  margin: 0 auto;
}

/* ── INPUT SECTION ── */
.input-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.category-row {
  display: flex;
  gap: 8px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.cat-chip {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.cat-chip:hover { border-color: var(--text3); color: var(--text); }
.cat-chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

.input-area {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  line-height: 1.6;
  resize: vertical;
  min-height: 120px;
  outline: none;
  transition: border-color 0.2s;
}

.input-area:focus { border-color: var(--accent); }
.input-area::placeholder { color: var(--text3); }

.input-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 1rem;
  gap: 12px;
  flex-wrap: wrap;
}

.char-count {
  font-size: 0.75rem;
  color: var(--text3);
}

.generate-btn {
  padding: 12px 32px;
  border-radius: var(--radius-sm);
  border: none;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}

.generate-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(167,139,250,0.35);
}

.generate-btn:disabled { opacity: 0.6; cursor: wait; }

.generate-btn.loading::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ── INSPIRATIONS ── */
.inspirations {
  margin-bottom: 1.5rem;
}

.inspirations-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
  cursor: pointer;
  padding: 4px 0;
}

.inspirations-header h3 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
}

.inspirations-header .toggle-icon {
  color: var(--text3);
  font-size: 0.7rem;
  transition: transform 0.2s;
}

.inspirations-header .toggle-icon.open { transform: rotate(180deg); }

.inspo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.3s ease;
}

.inspo-grid.collapsed { max-height: 0; opacity: 0; }

.inspo-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 1rem;
  cursor: pointer;
  transition: all 0.2s;
}

.inspo-card:hover {
  border-color: var(--accent);
  background: var(--bg3);
}

.inspo-card .inspo-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.inspo-badge.image { background: rgba(244,114,182,0.15); color: var(--pink); }
.inspo-badge.llm { background: rgba(96,165,250,0.15); color: var(--blue); }
.inspo-badge.code { background: rgba(52,211,153,0.15); color: var(--green); }
.inspo-badge.general { background: rgba(167,139,250,0.15); color: var(--purple); }

.inspo-card h4 { font-size: 0.88rem; margin-bottom: 4px; }
.inspo-card p { font-size: 0.75rem; color: var(--text3); line-height: 1.4; }

/* ── RESULT SECTION ── */
.result-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  display: none;
  animation: fadeIn 0.3s ease;
}

.result-section.visible { display: block; }

.result-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

.result-label .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.result-content {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 500px;
  overflow-y: auto;
  padding: 1rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 1rem;
}

.result-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  padding: 9px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn:hover { border-color: var(--text3); background: var(--bg4); }

.btn.primary {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

.btn.primary:hover { background: var(--accent2); }

.btn.ai {
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: #fff;
  border: none;
  position: relative;
  overflow: hidden;
}

.btn.ai:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(167,139,250,0.3);
}

.btn.ai:disabled { opacity: 0.6; cursor: wait; }

.btn.ai.loading::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: shimmer 1.2s infinite;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green);
  color: #000;
  padding: 10px 24px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.85rem;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 1000;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .header-inner { height: auto; padding: 12px 0; }
  main { padding: 1rem; }
  .hero h1 { font-size: 1.5rem; }
  .hero { padding: 1.5rem 0 1rem; }
  .input-section { padding: 1rem; }
  .result-section { padding: 1rem; }
  .inspo-grid { grid-template-columns: 1fr; }
  .generate-btn { width: 100%; justify-content: center; }
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.inspo-card { animation: fadeIn 0.3s ease both; }
.inspo-card:nth-child(2) { animation-delay: 0.05s; }
.inspo-card:nth-child(3) { animation-delay: 0.1s; }
.inspo-card:nth-child(4) { animation-delay: 0.15s; }
.inspo-card:nth-child(5) { animation-delay: 0.2s; }
.inspo-card:nth-child(6) { animation-delay: 0.25s; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">»</div>
      <span class="logo-text">Prompt Studio</span>
    </div>
    <span class="header-badge">Propulsé par Claude</span>
  </div>
</header>

<div class="toast" id="toast"></div>

<main>

  <!-- HERO -->
  <div class="hero">
    <h1>Créez le <span class="ai-gradient">prompt parfait</span></h1>
    <p>Décrivez simplement ce que vous voulez, l'IA génère un prompt optimisé et prêt à l'emploi.</p>
  </div>

  <!-- INPUT -->
  <div class="input-section">
    <div class="category-row" id="categoryRow">
      <button class="cat-chip active" data-cat="general">Général</button>
      <button class="cat-chip" data-cat="image">Image</button>
      <button class="cat-chip" data-cat="llm">LLM / Chat</button>
      <button class="cat-chip" data-cat="code">Code</button>
    </div>
    <textarea class="input-area" id="userInput" placeholder="Décrivez ce que vous voulez obtenir...&#10;&#10;Exemples :&#10;• Un portrait photo d'une femme dans un café parisien&#10;• Un assistant qui aide à rédiger des emails professionnels&#10;• Une fonction Python qui trie des fichiers par date"></textarea>
    <div class="input-footer">
      <span class="char-count" id="charCount">0 caractères</span>
      <button class="generate-btn" id="generateBtn" onclick="generate()">
        ✦ Générer le prompt
      </button>
    </div>
  </div>

  <!-- INSPIRATIONS -->
  <div class="inspirations">
    <div class="inspirations-header" onclick="toggleInspirations()">
      <h3>Inspirations rapides</h3>
      <span class="toggle-icon open" id="toggleIcon">▼</span>
    </div>
    <div class="inspo-grid" id="inspoGrid"></div>
  </div>

  <!-- RESULT -->
  <div class="result-section" id="resultSection">
    <div class="result-label"><span class="dot"></span> Prompt généré</div>
    <div class="result-content" id="resultContent"></div>
    <div class="result-actions">
      <button class="btn ai" onclick="improve()">✦ Améliorer</button>
      <button class="btn primary" onclick="copyResult()">Copier</button>
      <button class="btn" onclick="downloadResult()">Télécharger .txt</button>
      <button class="btn" onclick="editResult()">Modifier</button>
    </div>
  </div>

</main>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let selectedCategory = 'general';

// ══════════════════════════════════════
// INSPIRATIONS DATA
// ══════════════════════════════════════
const INSPIRATIONS = [
  { cat: 'image', title: 'Portrait cinématique', desc: 'Photo portrait avec éclairage et composition cinéma' },
  { cat: 'image', title: 'Paysage fantastique', desc: 'Scène épique d\'un monde imaginaire' },
  { cat: 'image', title: 'Logo minimaliste', desc: 'Logo moderne et épuré pour une marque' },
  { cat: 'image', title: 'Produit e-commerce', desc: 'Photo produit studio professionnelle' },
  { cat: 'llm', title: 'Rédacteur expert', desc: 'Rédiger comme un spécialiste du domaine' },
  { cat: 'llm', title: 'Traducteur nuancé', desc: 'Traduction qui préserve le ton et le style' },
  { cat: 'llm', title: 'Tuteur pédagogue', desc: 'Expliquer un concept complexe simplement' },
  { cat: 'llm', title: 'Correcteur de texte', desc: 'Relecture avec suggestions d\'amélioration' },
  { cat: 'code', title: 'API REST', desc: 'Concevoir une API avec bonnes pratiques' },
  { cat: 'code', title: 'Refactoring', desc: 'Améliorer la qualité d\'un code existant' },
  { cat: 'code', title: 'Tests unitaires', desc: 'Générer des tests complets pour une fonction' },
  { cat: 'code', title: 'Debug assistant', desc: 'Analyser et résoudre un bug' },
  { cat: 'general', title: 'Comparatif décisionnel', desc: 'Comparer des options pour décider' },
  { cat: 'general', title: 'Plan d\'action', desc: 'Structurer un projet étape par étape' },
  { cat: 'general', title: 'Brainstorming', desc: 'Générer des idées créatives sur un sujet' },
  { cat: 'general', title: 'Synthèse de document', desc: 'Résumer un long texte en points clés' },
];

// ══════════════════════════════════════
// CATEGORY SELECTION
// ══════════════════════════════════════
document.querySelectorAll('.cat-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedCategory = chip.dataset.cat;
    renderInspirations();
  });
});

// ══════════════════════════════════════
// INSPIRATIONS
// ══════════════════════════════════════
function renderInspirations() {
  const grid = document.getElementById('inspoGrid');
  const catLabels = { image: 'Image', llm: 'LLM', code: 'Code', general: 'Général' };
  const filtered = selectedCategory === 'general'
    ? INSPIRATIONS
    : INSPIRATIONS.filter(i => i.cat === selectedCategory);

  grid.innerHTML = filtered.map(i => `
    <div class="inspo-card" onclick="useInspiration('${i.title}', '${i.cat}')">
      <span class="inspo-badge ${i.cat}">${catLabels[i.cat]}</span>
      <h4>${i.title}</h4>
      <p>${i.desc}</p>
    </div>
  `).join('');
}

function useInspiration(title, cat) {
  // Set category
  selectedCategory = cat;
  document.querySelectorAll('.cat-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.cat === cat);
  });
  renderInspirations();

  // Fill input
  const input = document.getElementById('userInput');
  input.value = title + ' — ';
  input.focus();
  input.selectionStart = input.selectionEnd = input.value.length;
  updateCharCount();
}

let inspoOpen = true;
function toggleInspirations() {
  inspoOpen = !inspoOpen;
  document.getElementById('inspoGrid').classList.toggle('collapsed', !inspoOpen);
  document.getElementById('toggleIcon').classList.toggle('open', inspoOpen);
}

renderInspirations();

// ══════════════════════════════════════
// CHAR COUNT
// ══════════════════════════════════════
function updateCharCount() {
  const n = document.getElementById('userInput').value.length;
  document.getElementById('charCount').textContent = `${n} caractère${n > 1 ? 's' : ''}`;
}
document.getElementById('userInput').addEventListener('input', updateCharCount);

// ══════════════════════════════════════
// GENERATE
// ══════════════════════════════════════
async function generate() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) { showToast('Décrivez d\'abord ce que vous voulez !', true); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.innerHTML = '⏳ Génération en cours...';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description: text, category: selectedCategory })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur API');

    document.getElementById('resultContent').textContent = data.prompt;
    document.getElementById('resultSection').classList.add('visible');
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    showToast('Prompt généré !');
  } catch (err) {
    showToast('Erreur : ' + err.message, true);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.innerHTML = '✦ Générer le prompt';
  }
}

// Allow Ctrl+Enter to generate
document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generate();
});

// ══════════════════════════════════════
// IMPROVE
// ══════════════════════════════════════
async function improve() {
  const el = document.getElementById('resultContent');
  const text = el.textContent.trim();
  if (!text) return;

  const btn = event.target.closest('.btn');
  btn.disabled = true;
  btn.classList.add('loading');
  const original = btn.innerHTML;
  btn.innerHTML = '⏳ Amélioration...';

  try {
    const res = await fetch('/api/improve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur API');

    el.textContent = data.improved;
    showToast('Prompt amélioré !');
  } catch (err) {
    showToast('Erreur : ' + err.message, true);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.innerHTML = original;
  }
}

// ══════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════
function copyResult() {
  const text = document.getElementById('resultContent').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('Copié !'));
}

function downloadResult() {
  const text = document.getElementById('resultContent').textContent;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `prompt-${Date.now()}.txt`;
  a.click();
}

function editResult() {
  const el = document.getElementById('resultContent');
  if (el.contentEditable === 'true') {
    el.contentEditable = 'false';
    el.style.borderColor = 'var(--border)';
    showToast('Modification enregistrée');
  } else {
    el.contentEditable = 'true';
    el.style.borderColor = 'var(--accent)';
    el.focus();
    showToast('Mode édition activé — cliquez "Modifier" pour valider');
  }
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = isError ? 'var(--red)' : 'var(--green)';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
</script>
</body>
</html>
